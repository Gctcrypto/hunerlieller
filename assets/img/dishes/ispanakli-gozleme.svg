<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#8FA05E"/><stop offset="100%" stop-color="#5E6B43"/></linearGradient>
    <pattern id="dots" width="44" height="44" patternUnits="userSpaceOnUse"><circle cx="22" cy="22" r="1.2" fill="rgba(255,255,255,.09)"/></pattern>
    <filter id="glow"><feGaussianBlur stdDeviation="26"/></filter>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <rect width="800" height="600" fill="url(#dots)"/>
  <ellipse cx="160" cy="90" rx="220" ry="160" fill="rgba(255,255,255,.11)" filter="url(#glow)"/>
  <ellipse cx="650" cy="510" rx="180" ry="130" fill="rgba(0,0,0,.09)" filter="url(#glow)"/>
  <!-- Icon circle -->
  <circle cx="400" cy="218" r="76" fill="rgba(255,255,255,.15)" stroke="rgba(255,255,255,.38)" stroke-width="1.5"/>
  <circle cx="400" cy="218" r="54" fill="rgba(255,255,255,.09)"/>
  <!-- Food icon -->
  <g transform="translate(370,188) scale(2.5)" fill="none" stroke="rgba(255,255,255,.82)" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="8"/><path d="M9 9c1 .6 2 .6 3 0M14 11c1 .6 2 .4 3-.2M8 14c1.2.8 2.4.6 3.4-.2"/></g>
  <!-- Dish name -->
  <text x="400" y="320" text-anchor="middle" font-family="Georgia,serif" font-size="30" fill="rgba(255,255,255,.97)">Ispanaklı</text>
  <text x="400" y="362" text-anchor="middle" font-family="Georgia,serif" font-size="30" fill="rgba(255,255,255,.97)">Gözleme</text>
