  <!-- Replacement hint -->
  <text x="400" y="554" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="11.5" fill="rgba(255,255,255,.34)">Fotoğraf için önerilen: 800 × 600 px</text>
  <text x="400" y="573" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="rgba(255,255,255,.24)">Bu dosyayı aynı isimle değiştirin: ispanakli-gozleme.jpg</text>
